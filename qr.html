<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR-код Эко-Лабиринт</title>
<style>
body { font-family: sans-serif; text-align: center; padding: 40px; background: #E8F5E9; }
h1 { color: #2E7D32; }
#qr { margin: 30px auto; }
a { color: #1565C0; font-size: 18px; }
p { color: #555; margin-top: 20px; }
</style>
</head>
<body>
<h1>🌿 Эко-Лабиринт</h1>
<p>Отсканируй QR-код телефоном:</p>
<div id="qr"></div>
<p><a href="https://polimorf91-web.github.io/eco-maze/" target="_blank">https://polimorf91-web.github.io/eco-maze/</a></p>
<p style="color:#999; font-size:13px;">GitHub Pages может занять 1-2 минуты для первого деплоя</p>
<script>
// Минимальный QR-код генератор (QR Code Model 2, Version 3, ECC L)
// Использует API Google Charts для простоты
var url = 'https://polimorf91-web.github.io/eco-maze/';
var img = document.createElement('img');
img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(url);
img.alt = 'QR Code';
img.style.width = '300px';
img.style.height = '300px';
img.style.borderRadius = '12px';
img.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
document.getElementById('qr').appendChild(img);
</script>
</body>
</html>
